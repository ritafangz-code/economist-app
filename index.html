<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="英语期刊">
    <meta name="theme-color" content="#1a1a2e">
    <title>英语期刊 - English Magazines</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        :root {
            --primary: #e3120b;
            --bg: #0f0f1a;
            --card: #1a1a2e;
            --card-light: #252542;
            --text: #ffffff;
            --text-secondary: #a0a0b0;
            --border: #2a2a40;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            padding-top: env(safe-area-inset-top);
            padding-bottom: calc(80px + env(safe-area-inset-bottom));
            color: var(--text);
        }
        
        /* 顶部导航 */
        .top-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(15, 15, 26, 0.95);
            backdrop-filter: blur(20px);
            z-index: 1000;
            padding: 12px 16px;
            padding-top: calc(12px + env(safe-area-inset-top));
        }
        
        .top-nav-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 12px;
        }
        
        /* 期刊标签导航 */
        .mag-tabs {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 4px;
        }
        
        .mag-tabs::-webkit-scrollbar {
            display: none;
        }
        
        .mag-tab {
            flex-shrink: 0;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            background: var(--card);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }
        
        .mag-tab.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        
        /* 主内容区 */
        .main-content {
            padding-top: calc(100px + env(safe-area-inset-top));
        }
        
        /* 期刊头部大图 */
        .magazine-hero {
            position: relative;
            height: 280px;
            margin: 0 16px 20px;
            border-radius: 20px;
            overflow: hidden;
            background: var(--card);
        }
        
        .magazine-hero-bg {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-size: cover;
            background-position: center;
        }
        
        .magazine-hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.7) 100%);
        }
        
        .magazine-hero-content {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 24px;
            display: flex;
            align-items: flex-end;
            gap: 16px;
        }
        
        .hero-cover {
            width: 100px;
            height: 130px;
            border-radius: 8px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            object-fit: cover;
            flex-shrink: 0;
        }
        
        .hero-info {
            flex: 1;
            padding-bottom: 4px;
        }
        
        .hero-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 4px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        
        .hero-subtitle {
            font-size: 14px;
            color: rgba(255,255,255,0.8);
            margin-bottom: 12px;
        }
        
        .hero-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--primary);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: none;
        }
        
        /* 期刊列表 */
        .section-title {
            font-size: 18px;
            font-weight: 700;
            margin: 0 16px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .section-title span {
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
        }
        
        /* 横向滚动封面列表 */
        .cover-scroll {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding: 0 16px 20px;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
        }
        
        .cover-scroll::-webkit-scrollbar {
            display: none;
        }
        
        .cover-item {
            flex-shrink: 0;
            width: 140px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .cover-item:active {
            transform: scale(0.95);
        }
        
        .cover-image {
            width: 140px;
            height: 180px;
            border-radius: 12px;
            object-fit: cover;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            margin-bottom: 10px;
            background: var(--card);
        }
        
        .cover-date {
            font-size: 13px;
            color: var(--text-secondary);
            text-align: center;
        }
        
        /* 详情页 */
        .detail-page {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg);
            z-index: 2000;
            overflow-y: auto;
            padding-bottom: 100px;
        }
        
        .detail-page.active {
            display: block;
        }
        
        .detail-header {
            position: relative;
            height: 360px;
        }
        
        .detail-bg {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-size: cover;
            background-position: center;
        }
        
        .detail-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.4) 0%, rgba(15,15,26,1) 100%);
        }
        
        .detail-nav {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 16px;
            padding-top: calc(16px + env(safe-area-inset-top));
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 10;
        }
        
        .back-btn {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
            border: none;
            color: white;
        }
        
        .detail-content {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 24px;
            display: flex;
            gap: 20px;
            align-items: flex-end;
        }
        
        .detail-cover {
            width: 130px;
            height: 170px;
            border-radius: 10px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            object-fit: cover;
            flex-shrink: 0;
        }
        
        .detail-info {
            flex: 1;
            padding-bottom: 8px;
        }
        
        .detail-mag-name {
            font-size: 14px;
            color: var(--primary);
            font-weight: 600;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .detail-issue-date {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        
        .detail-issue-sub {
            font-size: 14px;
            color: var(--text-secondary);
        }
        
        /* 下载选项 */
        .download-section {
            padding: 24px;
        }
        
        .download-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 16px;
        }
        
        .download-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }
        
        .download-option {
            background: var(--card);
            border-radius: 16px;
            padding: 20px 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            color: var(--text);
            border: 1px solid var(--border);
        }
        
        .download-option:active {
            transform: scale(0.95);
            background: var(--card-light);
        }
        
        .download-icon {
            font-size: 28px;
            margin-bottom: 8px;
        }
        
        .download-label {
            font-size: 14px;
            font-weight: 600;
        }
        
        .download-format {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 2px;
        }
        
        .github-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 16px;
            border-radius: 16px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            width: 100%;
        }
        
        /* 提示卡片 */
        .tip-card {
            background: var(--card);
            border-radius: 16px;
            padding: 20px;
            margin: 0 24px 24px;
            border: 1px solid var(--border);
        }
        
        .tip-title {
            font-size: 14px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .tip-text {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.6;
        }
        
        /* 隐藏 */
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <!-- 顶部导航 -->
    <div class="top-nav">
        <div class="top-nav-title">英语期刊</div>
        <div class="mag-tabs">
            <div class="mag-tab active" onclick="switchMag('economist')">经济学人</div>
            <div class="mag-tab" onclick="switchMag('nyorker')">纽约客</div>
            <div class="mag-tab" onclick="switchMag('atlantic')">大西洋</div>
            <div class="mag-tab" onclick="switchMag('wired')">连线</div>
        </div>
    </div>
    
    <!-- 主内容 -->
    <div class="main-content" id="main-content">
        <!-- 动态生成 -->
    </div>
    
    <!-- 详情页 -->
    <div class="detail-page" id="detail-page">
        <div class="detail-header">
            <div class="detail-bg" id="detail-bg"></div>
            <div class="detail-overlay"></div>
            <div class="detail-nav">
                <button class="back-btn" onclick="closeDetail()">←</button>
            </div>
            <div class="detail-content">
                <img class="detail-cover" id="detail-cover" src="" alt="">
                <div class="detail-info">
                    <div class="detail-mag-name" id="detail-mag-name">The Economist</div>
                    <div class="detail-issue-date" id="detail-issue-date">2026.04.04</div>
                    <div class="detail-issue-sub" id="detail-issue-sub">2026年4月4日</div>
                </div>
            </div>
        </div>
        
        <div class="tip-card">
            <div class="tip-title">💡 阅读建议</div>
            <div class="tip-text">
                PDF 适合打印和精确排版阅读<br>
                EPUB 适合 Apple Books、KyBook 等阅读器<br>
                MOBI 适合 Kindle 设备
            </div>
        </div>
        
        <div class="download-section">
            <div class="download-title">选择格式下载</div>
            <div class="download-grid">
                <a href="#" class="download-option" id="dl-pdf" target="_blank">
                    <div class="download-icon">📄</div>
                    <div class="download-label">PDF</div>
                    <div class="download-format">标准格式</div>
                </a>
                <a href="#" class="download-option" id="dl-epub" target="_blank">
                    <div class="download-icon">📖</div>
                    <div class="download-label">EPUB</div>
                    <div class="download-format">电子书</div>
                </a>
                <a href="#" class="download-option" id="dl-mobi" target="_blank">
                    <div class="download-icon">📚</div>
                    <div class="download-label">MOBI</div>
                    <div class="download-format">Kindle</div>
                </a>
            </div>
            <a href="#" class="github-btn" id="github-link" target="_blank">
                <span>🔗</span>
                <span>在 GitHub 上查看源文件</span>
            </a>
        </div>
    </div>

    <script>
        // 期刊数据
        const magazines = {
            economist: {
                name: 'The Economist',
                nameCN: '经济学人',
                color: '#e3120b',
                folder: '01_economist',
                filePrefix: 'TheEconomist',
                issues: [
                    { date: '2026.04.04', dateCN: '2026年4月4日', folder: 'te_2026.04.04' },
                    { date: '2026.03.28', dateCN: '2026年3月28日', folder: 'te_2026.03.28' },
                    { date: '2026.03.21', dateCN: '2026年3月21日', folder: 'te_2026.03.21' },
                    { date: '2026.03.14', dateCN: '2026年3月14日', folder: 'te_2026.03.14' },
                    { date: '2026.03.07', dateCN: '2026年3月7日', folder: 'te_2026.03.07' }
                ]
            },
            nyorker: {
                name: 'The New Yorker',
                nameCN: '纽约客',
                color: '#000000',
                folder: '02_new_yorker',
                filePrefix: 'TheNewYorker',
                issues: [
                    { date: '2026.04.06', dateCN: '2026年4月6日', folder: '2026.04.06' },
                    { date: '2026.03.30', dateCN: '2026年3月30日', folder: '2026.03.30' },
                    { date: '2026.03.23', dateCN: '2026年3月23日', folder: '2026.03.23' },
                    { date: '2026.03.16', dateCN: '2026年3月16日', folder: '2026.03.16' },
                    { date: '2026.03.09', dateCN: '2026年3月9日', folder: '2026.03.09' }
                ]
            },
            atlantic: {
                name: 'The Atlantic',
                nameCN: '大西洋月刊',
                color: '#003366',
                folder: '04_atlantic',
                filePrefix: 'TheAtlantic',
                issues: [
                    { date: '2026.04', dateCN: '2026年4月刊', folder: '2026.04.02' },
                    { date: '2026.03', dateCN: '2026年3月刊', folder: '2026.03.02' },
                    { date: '2026.02', dateCN: '2026年2月刊', folder: '2026.02.02' },
                    { date: '2026.01', dateCN: '2026年1月刊', folder: '2026.01.02' },
                    { date: '2025.12', dateCN: '2025年12月刊', folder: '2025.12.02' }
                ]
            },
            wired: {
                name: 'WIRED',
                nameCN: '连线',
                color: '#000000',
                folder: '05_wired',
                filePrefix: 'Wired',
                issues: [
                    { date: '2026.04', dateCN: '2026年4月刊', folder: '2026.04.02' },
                    { date: '2026.03', dateCN: '2026年3月刊', folder: '2026.03.02' },
                    { date: '2026.02', dateCN: '2026年2月刊', folder: '2026.02.02' },
                    { date: '2026.01', dateCN: '2026年1月刊', folder: '2026.01.02' },
                    { date: '2025.12', dateCN: '2025年12月刊', folder: '2025.12.02' }
                ]
            }
        };
        
        let currentMag = 'economist';
        
        // 生成封面URL（使用GitHub缩略图或默认封面）
        function getCoverUrl(magKey, issue) {
            const mag = magazines[magKey];
            // 使用GitHub raw链接作为封面
            return `https://raw.githubusercontent.com/hehonghui/awesome-english-ebooks/master/${mag.folder}/${issue.folder}/${mag.filePrefix}.${issue.date}.jpg`;
        }
        
        // 生成下载链接
        function getDownloadLinks(magKey, issue) {
            const mag = magazines[magKey];
            const baseUrl = 'https://raw.githubusercontent.com/hehonghui/awesome-english-ebooks/master';
            const folder = `${mag.folder}/${issue.folder}`;
            const fileName = `${mag.filePrefix}.${issue.date}`;
            
            return {
                pdf: `${baseUrl}/${folder}/${fileName}.pdf`,
                epub: `${baseUrl}/${folder}/${fileName}.epub`,
                mobi: `${baseUrl}/${folder}/${fileName}.mobi`,
                github: `https://github.com/hehonghui/awesome-english-ebooks/tree/master/${folder}`
            };
        }
        
        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            renderMagazine(currentMag);
        });
        
        // 切换期刊
        function switchMag(magKey) {
            currentMag = magKey;
            
            // 更新标签状态
            document.querySelectorAll('.mag-tab').forEach((tab, index) => {
                const keys = Object.keys(magazines);
                tab.classList.toggle('active', keys[index] === magKey);
            });
            
            renderMagazine(magKey);
        }
        
        // 渲染期刊页面
        function renderMagazine(magKey) {
            const mag = magazines[magKey];
            const latest = mag.issues[0];
            const coverUrl = getCoverUrl(magKey, latest);
            const links = getDownloadLinks(magKey, latest);
            
            const html = `
                <!-- 头部大图 -->
                <div class="magazine-hero">
                    <div class="magazine-hero-bg" style="background-image: url('${coverUrl}')"></div>
                    <div class="magazine-hero-overlay"></div>
                    <div class="magazine-hero-content">
                        <img class="hero-cover" src="${coverUrl}" alt="${mag.name}" onerror="this.style.display='none'">
                        <div class="hero-info">
                            <div class="hero-title">${mag.name}</div>
                            <div class="hero-subtitle">最新一期 · ${latest.dateCN}</div>
                            <button class="hero-btn" onclick="openDetail('${magKey}', 0)">
                                <span>📥</span>
                                <span>立即下载</span>
                            </button>
                        </div>
                    </div>
                </div>
                
                <!-- 近期期刊 -->
                <div class="section-title">
                    近期期刊
                    <span>共 ${mag.issues.length} 期</span>
                </div>
                <div class="cover-scroll">
                    ${mag.issues.map((issue, index) => `
                        <div class="cover-item" onclick="openDetail('${magKey}', ${index})">
                            <img class="cover-image" src="${getCoverUrl(magKey, issue)}" alt="${issue.date}" onerror="this.style.background='linear-gradient(135deg, ${mag.color} 0%, #1a1a2e 100%)'">
                            <div class="cover-date">${issue.dateCN}</div>
                        </div>
                    `).join('')}
                </div>
            `;
            
            document.getElementById('main-content').innerHTML = html;
        }
        
        // 打开详情页
        function openDetail(magKey, issueIndex) {
            const mag = magazines[magKey];
            const issue = mag.issues[issueIndex];
            const coverUrl = getCoverUrl(magKey, issue);
            const links = getDownloadLinks(magKey, issue);
            
            // 设置详情页内容
            document.getElementById('detail-bg').style.backgroundImage = `url('${coverUrl}')`;
            document.getElementById('detail-cover').src = coverUrl;
            document.getElementById('detail-mag-name').textContent = mag.name;
            document.getElementById('detail-mag-name').style.color = mag.color;
            document.getElementById('detail-issue-date').textContent = issue.date;
            document.getElementById('detail-issue-sub').textContent = issue.dateCN;
            
            // 设置下载链接
            document.getElementById('dl-pdf').href = links.pdf;
            document.getElementById('dl-epub').href = links.epub;
            document.getElementById('dl-mobi').href = links.mobi;
            document.getElementById('github-link').href = links.github;
            
            // 显示详情页
            document.getElementById('detail-page').classList.add('active');
            document.body.style.overflow = 'hidden';
        }
        
        // 关闭详情页
        function closeDetail() {
            document.getElementById('detail-page').classList.remove('active');
            document.body.style.overflow = '';
        }
    </script>
</body>
</html>
