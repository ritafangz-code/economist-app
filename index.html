<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="经济学人">
    <meta name="theme-color" content="#667eea">
    <title>经济学人 - The Economist</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
        }
        
        :root {
            --primary: #667eea;
            --primary-dark: #764ba2;
            --bg: #f5f5f7;
            --card: #ffffff;
            --text: #1d1d1f;
            --text-secondary: #86868b;
            --border: #d2d2d7;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            color: var(--text);
        }
        
        /* 底部导航 */
        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
            z-index: 1000;
        }
        
        .tab-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .tab-item.active {
            color: var(--primary);
        }
        
        .tab-item:not(.active) {
            color: var(--text-secondary);
        }
        
        .tab-icon {
            font-size: 24px;
            margin-bottom: 2px;
        }
        
        .tab-label {
            font-size: 11px;
            font-weight: 500;
        }
        
        /* 页面容器 */
        .page {
            display: none;
            padding: 16px;
            padding-bottom: 100px;
            min-height: 100vh;
        }
        
        .page.active {
            display: block;
        }
        
        /* 导航栏 */
        .nav-header {
            position: sticky;
            top: 0;
            background: var(--bg);
            padding: 12px 0;
            z-index: 100;
            backdrop-filter: blur(20px);
        }
        
        .nav-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        
        .nav-subtitle {
            font-size: 15px;
            color: var(--text-secondary);
        }
        
        /* 卡片 */
        .card {
            background: var(--card);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        
        /* 最新期刊封面 */
        .latest-issue {
            position: relative;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            border-radius: 20px;
            padding: 24px;
            color: white;
            margin-bottom: 20px;
            overflow: hidden;
        }
        
        .latest-issue::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 200px;
            height: 200px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
        }
        
        .issue-label {
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.9;
            margin-bottom: 8px;
        }
        
        .issue-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        
        .issue-date {
            font-size: 15px;
            opacity: 0.9;
            margin-bottom: 20px;
        }
        
        .btn-primary {
            background: white;
            color: var(--primary);
            border: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary:active {
            transform: scale(0.98);
            opacity: 0.9;
        }
        
        /* 期刊列表 */
        .section-title {
            font-size: 20px;
            font-weight: 700;
            margin: 24px 0 16px;
        }
        
        .issue-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .issue-item {
            display: flex;
            align-items: center;
            background: var(--card);
            border-radius: 16px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .issue-item:active {
            transform: scale(0.98);
            background: #f0f0f0;
        }
        
        .issue-cover {
            width: 60px;
            height: 80px;
            background: linear-gradient(135deg, #e0e0e0 0%, #f0f0f0 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin-right: 16px;
            flex-shrink: 0;
        }
        
        .issue-info {
            flex: 1;
        }
        
        .issue-name {
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .issue-meta {
            font-size: 14px;
            color: var(--text-secondary);
        }
        
        .issue-arrow {
            font-size: 20px;
            color: var(--text-secondary);
        }
        
        /* 文章列表 */
        .article-item {
            display: flex;
            align-items: flex-start;
            padding: 16px 0;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
        }
        
        .article-item:last-child {
            border-bottom: none;
        }
        
        .article-number {
            width: 28px;
            height: 28px;
            background: var(--primary);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 600;
            margin-right: 12px;
            flex-shrink: 0;
        }
        
        .article-content {
            flex: 1;
        }
        
        .article-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
            line-height: 1.4;
        }
        
        .article-category {
            font-size: 13px;
            color: var(--primary);
            font-weight: 500;
        }
        
        .article-audio {
            width: 36px;
            height: 36px;
            background: #f0f0f0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            margin-left: 8px;
            flex-shrink: 0;
        }
        
        /* 音频播放器 */
        .audio-player {
            position: fixed;
            bottom: 80px;
            left: 16px;
            right: 16px;
            background: var(--card);
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            display: none;
            z-index: 999;
        }
        
        .audio-player.active {
            display: block;
        }
        
        .audio-info {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
        }
        
        .audio-cover {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-right: 12px;
        }
        
        .audio-text {
            flex: 1;
        }
        
        .audio-title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .audio-author {
            font-size: 13px;
            color: var(--text-secondary);
        }
        
        .audio-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 24px;
        }
        
        .audio-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            background: var(--primary);
            color: white;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .audio-btn.secondary {
            width: 40px;
            height: 40px;
            background: #f0f0f0;
            color: var(--text);
            font-size: 18px;
        }
        
        .progress-bar {
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            margin: 12px 0;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: var(--primary);
            border-radius: 2px;
            width: 0%;
            transition: width 0.1s;
        }
        
        /* 阅读页面 */
        .reader-header {
            display: flex;
            align-items: center;
            padding: 12px 0;
            margin-bottom: 16px;
        }
        
        .back-btn {
            width: 36px;
            height: 36px;
            background: var(--card);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
            margin-right: 12px;
        }
        
        .reader-title {
            flex: 1;
            font-size: 17px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .reader-actions {
            display: flex;
            gap: 8px;
        }
        
        .reader-action {
            width: 36px;
            height: 36px;
            background: var(--card);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
        }
        
        /* 文章内容 */
        .article-body {
            background: var(--card);
            border-radius: 16px;
            padding: 24px;
            line-height: 1.8;
            font-size: 17px;
        }
        
        .article-body h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 16px;
            line-height: 1.3;
        }
        
        .article-body h2 {
            font-size: 20px;
            font-weight: 600;
            margin: 24px 0 12px;
        }
        
        .article-body p {
            margin-bottom: 16px;
            color: #333;
        }
        
        /* 加载状态 */
        .loading {
            text-align: center;
            padding: 60px 20px;
        }
        
        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 3px solid #f0f0f0;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }
        
        .empty-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }
        
        .empty-text {
            font-size: 17px;
            margin-bottom: 8px;
        }
        
        .empty-subtext {
            font-size: 15px;
            opacity: 0.8;
        }
        
        /* 隐藏 */
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <!-- 首页 -->
    <div id="page-home" class="page active">
        <div class="nav-header">
            <div class="nav-title">经济学人</div>
            <div class="nav-subtitle">每周精选，深度阅读</div>
        </div>
        
        <!-- 最新期刊 -->
        <div class="latest-issue" onclick="openLatestIssue()">
            <div class="issue-label">Latest Issue</div>
            <div class="issue-title">The Economist</div>
            <div class="issue-date" id="latest-date">2026年4月4日</div>
            <button class="btn-primary">
                <span>📖</span>
                <span>立即阅读</span>
            </button>
        </div>
        
        <!-- 近期期刊 -->
        <div class="section-title">近期期刊</div>
        <div class="issue-list" id="issue-list">
            <!-- 动态生成 -->
        </div>
    </div>
    
    <!-- 期刊详情页 -->
    <div id="page-issue" class="page">
        <div class="reader-header">
            <div class="back-btn" onclick="showPage('home')">←</div>
            <div class="reader-title" id="issue-detail-title">期刊详情</div>
            <div class="reader-actions">
                <div class="reader-action" onclick="downloadCurrentIssue()">⬇️</div>
                <div class="reader-action">⋮</div>
            </div>
        </div>
        
        <div class="card">
            <div style="display: flex; align-items: center; margin-bottom: 16px;">
                <div class="issue-cover" style="width: 80px; height: 110px; font-size: 36px;">📰</div>
                <div style="margin-left: 16px;">
                    <div style="font-size: 20px; font-weight: 700; margin-bottom: 4px;" id="issue-title">The Economist</div>
                    <div style="font-size: 15px; color: var(--text-secondary);" id="issue-date">2026.04.04</div>
                    <div style="margin-top: 12px;">
                        <span style="background: #e8f5e9; color: #4caf50; padding: 4px 12px; border-radius: 12px; font-size: 13px; font-weight: 500;">✓ 已缓存</span>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="section-title">本期文章</div>
        <div class="card" id="article-list">
            <!-- 动态生成文章列表 -->
        </div>
    </div>
    
    <!-- 阅读页面 -->
    <div id="page-reader" class="page">
        <div class="reader-header">
            <div class="back-btn" onclick="showPage('issue')">←</div>
            <div class="reader-title" id="article-title">文章标题</div>
            <div class="reader-actions">
                <div class="reader-action" onclick="toggleAudio()">🔊</div>
                <div class="reader-action">⋮</div>
            </div>
        </div>
        
        <div class="article-body" id="article-content">
            <!-- 文章内容 -->
        </div>
    </div>
    
    <!-- 我的页面 -->
    <div id="page-profile" class="page">
        <div class="nav-header">
            <div class="nav-title">我的</div>
        </div>
        
        <div class="card">
            <div style="display: flex; align-items: center; padding: 8px 0;">
                <div style="width: 60px; height: 60px; background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px;">👤</div>
                <div style="margin-left: 16px;">
                    <div style="font-size: 18px; font-weight: 600;">经济学人读者</div>
                    <div style="font-size: 14px; color: var(--text-secondary); margin-top: 4px;">已缓存 3 期期刊</div>
                </div>
            </div>
        </div>
        
        <div class="section-title">阅读统计</div>
        <div class="card">
            <div style="display: flex; justify-content: space-around; text-align: center;">
                <div>
                    <div style="font-size: 28px; font-weight: 700; color: var(--primary);">12</div>
                    <div style="font-size: 13px; color: var(--text-secondary); margin-top: 4px;">已读文章</div>
                </div>
                <div>
                    <div style="font-size: 28px; font-weight: 700; color: var(--primary);">3</div>
                    <div style="font-size: 13px; color: var(--text-secondary); margin-top: 4px;">已缓存期刊</div>
                </div>
                <div>
                    <div style="font-size: 28px; font-weight: 700; color: var(--primary);">5h</div>
                    <div style="font-size: 13px; color: var(--text-secondary); margin-top: 4px;">听音频时长</div>
                </div>
            </div>
        </div>
        
        <div class="section-title">设置</div>
        <div class="card">
            <div class="article-item" style="padding: 16px 0;">
                <div class="article-content">
                    <div class="article-title">清除缓存</div>
                </div>
                <div class="issue-arrow">›</div>
            </div>
            <div class="article-item" style="padding: 16px 0;">
                <div class="article-content">
                    <div class="article-title">关于</div>
                </div>
                <div class="issue-arrow">›</div>
            </div>
        </div>
    </div>
    
    <!-- 音频播放器 -->
    <div class="audio-player" id="audio-player">
        <div class="audio-info">
            <div class="audio-cover">🔊</div>
            <div class="audio-text">
                <div class="audio-title" id="audio-title">音频标题</div>
                <div class="audio-author">经济学人</div>
            </div>
            <div style="font-size: 20px; cursor: pointer;" onclick="closeAudio()">✕</div>
        </div>
        <div class="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div class="audio-controls">
            <button class="audio-btn secondary" onclick="seekBackward()">⏮</button>
            <button class="audio-btn" id="play-btn" onclick="togglePlay()">▶</button>
            <button class="audio-btn secondary" onclick="seekForward()">⏭</button>
        </div>
    </div>
    
    <!-- 底部导航 -->
    <div class="tab-bar">
        <div class="tab-item active" onclick="switchTab('home')">
            <div class="tab-icon">📚</div>
            <div class="tab-label">期刊</div>
        </div>
        <div class="tab-item" onclick="switchTab('bookmarks')">
            <div class="tab-icon">🔖</div>
            <div class="tab-label">收藏</div>
        </div>
        <div class="tab-item" onclick="switchTab('profile')">
            <div class="tab-icon">👤</div>
            <div class="tab-label">我的</div>
        </div>
    </div>
    
    <!-- 音频元素 -->
    <audio id="audio-element" preload="none"></audio>

    <script>
        // 数据
        const issues = [
            { id: 'te_2026.04.04', name: 'te_2026.04.04', date: '2026年4月4日', dateShort: '2026.04.04', cached: true },
            { id: 'te_2026.03.28', name: 'te_2026.03.28', date: '2026年3月28日', dateShort: '2026.03.28', cached: true },
            { id: 'te_2026.03.21', name: 'te_2026.03.21', date: '2026年3月21日', dateShort: '2026.03.21', cached: false },
            { id: 'te_2026.03.14', name: 'te_2026.03.14', date: '2026年3月14日', dateShort: '2026.03.14', cached: false },
            { id: 'te_2026.03.07', name: 'te_2026.03.07', date: '2026年3月7日', dateShort: '2026.03.07', cached: false },
        ];
        
        const articles = {
            'te_2026.04.04': [
                { id: 1, title: 'The world this week: Politics', category: 'World', hasAudio: true },
                { id: 2, title: 'The world this week: Business', category: 'Business', hasAudio: true },
                { id: 3, title: 'Leaders: The future of global trade', category: 'Leaders', hasAudio: true },
                { id: 4, title: 'Letters: On artificial intelligence', category: 'Letters', hasAudio: false },
                { id: 5, title: 'Briefing: Climate change economics', category: 'Briefing', hasAudio: true },
                { id: 6, title: 'United States: Immigration reform', category: 'United States', hasAudio: true },
                { id: 7, title: 'The Americas: Brazil\'s economy', category: 'The Americas', hasAudio: false },
                { id: 8, title: 'Asia: China\'s tech industry', category: 'Asia', hasAudio: true },
            ]
        };
        
        // 当前状态
        let currentIssue = null;
        let currentArticle = null;
        let isPlaying = false;
        let audioElement = document.getElementById('audio-element');
        
        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            renderIssueList();
        });
        
        // 渲染期刊列表
        function renderIssueList() {
            const list = document.getElementById('issue-list');
            list.innerHTML = issues.slice(1).map(issue => `
                <div class="issue-item" onclick="openIssue('${issue.id}')">
                    <div class="issue-cover">📰</div>
                    <div class="issue-info">
                        <div class="issue-name">The Economist</div>
                        <div class="issue-meta">${issue.date} · ${issue.cached ? '✓ 已缓存' : '在线阅读'}</div>
                    </div>
                    <div class="issue-arrow">›</div>
                </div>
            `).join('');
        }
        
        // 切换页面
        function showPage(pageName) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(`page-${pageName}`).classList.add('active');
            
            // 更新底部导航
            if (pageName === 'home') {
                switchTab('home');
            } else if (pageName === 'profile') {
                document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-item')[2].classList.add('active');
            }
        }
        
        // 切换底部标签
        function switchTab(tabName) {
            if (tabName === 'home') {
                showPage('home');
                document.querySelectorAll('.tab-item').forEach((t, i) => {
                    t.classList.toggle('active', i === 0);
                });
            } else if (tabName === 'bookmarks') {
                // 显示空状态
                alert('收藏功能开发中...');
            } else if (tabName === 'profile') {
                showPage('profile');
                document.querySelectorAll('.tab-item').forEach((t, i) => {
                    t.classList.toggle('active', i === 2);
                });
            }
        }
        
        // 打开最新一期
        function openLatestIssue() {
            openIssue('te_2026.04.04');
        }
        
        // 打开特定期刊
        function openIssue(issueId) {
            currentIssue = issues.find(i => i.id === issueId);
            if (!currentIssue) return;
            
            // 更新期刊详情页
            document.getElementById('issue-detail-title').textContent = currentIssue.dateShort;
            document.getElementById('issue-title').textContent = 'The Economist';
            document.getElementById('issue-date').textContent = currentIssue.dateShort;
            
            // 渲染文章列表
            renderArticleList(issueId);
            
            // 显示期刊详情页
            showPage('issue');
        }
        
        // 渲染文章列表
        function renderArticleList(issueId) {
            const list = document.getElementById('article-list');
            const issueArticles = articles[issueId] || [];
            
            list.innerHTML = issueArticles.map((article, index) => `
                <div class="article-item" onclick="openArticle(${article.id})">
                    <div class="article-number">${index + 1}</div>
                    <div class="article-content">
                        <div class="article-title">${article.title}</div>
                        <div class="article-category">${article.category}</div>
                    </div>
                    ${article.hasAudio ? '<div class="article-audio">🔊</div>' : ''}
                </div>
            `).join('');
        }
        
        // 打开文章
        function openArticle(articleId) {
            const article = articles[currentIssue.id]?.find(a => a.id === articleId);
            if (!article) return;
            
            currentArticle = article;
            document.getElementById('article-title').textContent = article.title;
            
            // 生成文章内容（示例）
            document.getElementById('article-content').innerHTML = `
                <h1>${article.title}</h1>
                <p style="color: var(--text-secondary); margin-bottom: 24px;">${article.category} · The Economist · ${currentIssue.date}</p>
                <p>这是一篇来自《经济学人》的深度文章。在实际应用中，这里会显示完整的文章内容。</p>
                <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.</p>
                <h2>Key Points</h2>
                <p>Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat.</p>
                <p>Duis aute irure dolor in reprehenderit in voluptate velit esse cillum dolore eu fugiat nulla pariatur.</p>
                <h2>Analysis</h2>
                <p>Excepteur sint occaecat cupidatat non proident, sunt in culpa qui officia deserunt mollit anim id est laborum.</p>
                <p>Sed ut perspiciatis unde omnis iste natus error sit voluptatem accusantium doloremque laudantium.</p>
            `;
            
            showPage('reader');
        }
        
        // 下载当前期刊
        function downloadCurrentIssue() {
            if (currentIssue) {
                currentIssue.cached = true;
                alert(`《The Economist》${currentIssue.dateShort} 已添加到缓存`);
                renderIssueList();
            }
        }
        
        // 音频控制
        function toggleAudio() {
            if (!currentArticle) return;
            
            if (!currentArticle.hasAudio) {
                alert('这篇文章暂无音频');
                return;
            }
            
            document.getElementById('audio-player').classList.add('active');
            document.getElementById('audio-title').textContent = currentArticle.title;
            
            // 模拟播放
            if (!isPlaying) {
                togglePlay();
            }
        }
        
        function togglePlay() {
            isPlaying = !isPlaying;
            const btn = document.getElementById('play-btn');
            btn.textContent = isPlaying ? '⏸' : '▶';
            
            if (isPlaying) {
                // 模拟进度更新
                updateProgress();
            }
        }
        
        function updateProgress() {
            if (!isPlaying) return;
            
            const fill = document.getElementById('progress-fill');
            let width = parseFloat(fill.style.width) || 0;
            width += 0.5;
            if (width > 100) width = 0;
            fill.style.width = width + '%';
            
            setTimeout(updateProgress, 1000);
        }
        
        function closeAudio() {
            document.getElementById('audio-player').classList.remove('active');
            isPlaying = false;
            document.getElementById('play-btn').textContent = '▶';
        }
        
        function seekBackward() {
            const fill = document.getElementById('progress-fill');
            let width = parseFloat(fill.style.width) || 0;
            width = Math.max(0, width - 10);
            fill.style.width = width + '%';
        }
        
        function seekForward() {
            const fill = document.getElementById('progress-fill');
            let width = parseFloat(fill.style.width) || 0;
            width = Math.min(100, width + 10);
            fill.style.width = width + '%';
        }
    </script>
</body>
</html>
